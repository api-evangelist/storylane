specificationVersion: "1.0"
aid: storylane:finops
name: Storylane FinOps
description: >
  FinOps Framework FOCUS-aligned cost and usage guidance for Storylane
  interactive demo platform subscriptions. Covers cost allocation, optimization
  levers, and governance considerations for Demo Suite and RepX Chat plans.
url: https://www.storylane.io/pricing
provider: Storylane
currency: USD

costModel:
  type: subscription
  billingCycles:
    - monthly
    - annual
  discounts:
    - description: Annual billing discount of approximately 20 percent versus monthly rates
      type: annual-commitment
    - description: First-year promotional discount of 20 percent on annual plans using code G220OFF
      type: promotional

skus:
  - sku: demo-suite-free
    name: Demo Suite Free
    unitPrice: 0.00
    billingCycle: monthly
    unit: workspace/month
    tier: Free

  - sku: demo-suite-starter-monthly
    name: Demo Suite Starter (Monthly)
    unitPrice: 50.00
    billingCycle: monthly
    unit: seat/month
    tier: Starter
    additionalUnits:
      - name: Additional Seat
        unitPrice: 40.00
        unit: seat/month

  - sku: demo-suite-starter-annual
    name: Demo Suite Starter (Annual)
    unitPrice: 40.00
    billingCycle: annual
    unit: seat/month
    tier: Starter
    additionalUnits:
      - name: Additional Seat
        unitPrice: 40.00
        unit: seat/month

  - sku: demo-suite-growth-monthly
    name: Demo Suite Growth (Monthly)
    unitPrice: 625.00
    billingCycle: monthly
    unit: workspace/month
    seatsIncluded: 5
    tier: Growth
    additionalUnits:
      - name: Additional Seat
        unitPrice: 100.00
        unit: seat/month

  - sku: demo-suite-growth-annual
    name: Demo Suite Growth (Annual)
    unitPrice: 500.00
    billingCycle: annual
    unit: workspace/month
    seatsIncluded: 5
    tier: Growth
    additionalUnits:
      - name: Additional Seat
        unitPrice: 100.00
        unit: seat/month

  - sku: demo-suite-premium-monthly
    name: Demo Suite Premium (Monthly)
    unitPrice: 1500.00
    billingCycle: monthly
    unit: workspace/month
    seatsIncluded: 10
    tier: Premium

  - sku: demo-suite-premium-annual
    name: Demo Suite Premium (Annual)
    unitPrice: 1200.00
    billingCycle: annual
    unit: workspace/month
    seatsIncluded: 10
    tier: Premium

  - sku: demo-suite-enterprise
    name: Demo Suite Enterprise
    unitPrice: custom
    billingCycle: annual
    unit: workspace/year
    tier: Enterprise
    notes: Includes External REST API access, private demo links, and enterprise security.

  - sku: repx-chat-growth
    name: RepX Chat Growth
    unitPrice: 2000.00
    billingCycle: monthly
    unit: workspace/month
    capacity: 10000 monthly visitors
    tier: RepX Growth
    notes: Includes Demo Suite features.

  - sku: repx-chat-premium
    name: RepX Chat Premium
    unitPrice: 3000.00
    billingCycle: monthly
    unit: workspace/month
    capacity: 40000 monthly visitors
    tier: RepX Premium
    notes: Includes full Demo Suite features.

  - sku: repx-chat-enterprise
    name: RepX Chat Enterprise
    unitPrice: custom
    billingCycle: annual
    unit: workspace/year
    capacity: 40000+ monthly visitors
    tier: RepX Enterprise

costAllocation:
  tags:
    - name: team
      description: Allocate Storylane costs to marketing, sales, or product teams by workspace or seat assignment.
    - name: environment
      description: Tag workspaces used for production demos versus internal training or development.
    - name: cost-center
      description: Map subscription charges to finance cost centers for chargeback or showback reporting.
  notes: >
    Storylane does not natively expose cost allocation tags via API. Cost
    allocation should be managed in the finance system by mapping seat counts
    and workspace identifiers to internal cost centers.

optimization:
  recommendations:
    - name: Annual Commitment Discount
      description: >
        Commit to annual billing to save approximately 20 percent compared to
        monthly rates across all Demo Suite tiers. Validate seat utilization
        before committing to avoid over-provisioning.
    - name: Right-size Seat Count
      description: >
        Audit active seat usage quarterly. Remove unused seats on Starter or
        Growth plans where additional seats are billed individually at
        $40-$100 per seat per month.
    - name: Plan Tier Evaluation
      description: >
        Evaluate whether account reveal volume and integration requirements
        justify the step from Starter (250 reveals/month) to Growth
        (2,500 reveals/month) before upgrading.
    - name: RepX Chat Capacity Alignment
      description: >
        Monitor monthly visitor volume against the 10,000-visitor (Growth) or
        40,000-visitor (Premium) capacity caps to avoid overage conversations
        and to identify the right RepX plan tier.
    - name: API Access Gating
      description: >
        API access is available only on the Enterprise plan. If the primary
        driver for an Enterprise upgrade is API access, assess whether
        Zapier-based integrations on lower tiers can meet the same workflow
        needs at lower cost.

governance:
  notes: >
    Storylane access tokens for the External API are not stored server-side
    and cannot be recovered if lost. Implement a secrets management process
    (e.g., a vault or secrets manager) to store issued tokens securely.
    Rotate tokens periodically and revoke compromised tokens immediately
    by contacting support@storylane.io. Enforce SSO (available on Premium
    and Enterprise plans) to centralize identity governance across workspace
    members.
  contacts:
    - role: Billing Support
      email: support@storylane.io
    - role: API Access Requests
      email: support@storylane.io
