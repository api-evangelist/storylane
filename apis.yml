apis:
  - aid: storylane:storylane-external-api
    name: Storylane External API
    description: >
      The Storylane External API allows Enterprise plan customers to
      programmatically list published demos, retrieve demo details including
      chapters and steps, manage demo links, create new shareable links with
      advanced security options such as passcodes and expiration dates, and
      update existing link configurations. Authentication uses a Bearer token
      paired with a workspace identifier, and a public Postman collection is
      provided for testing endpoints.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
